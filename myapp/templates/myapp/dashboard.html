{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'myapp/style.css' %}">

</head>
<body>

<style>
    body {
        background: url('{% static 'myapp/background1.jpg' %}') no-repeat center center fixed;
        background-size: cover;
        height: 100vh;
    }
</style>

    <div class="container-fluid">
        <!-- Header Section -->
        <div class="row bg-primary text-white p-3">
            <div class="col-md-10">
                <h2>Provider Agency Dashboard</h2>
            </div>
            <div class="col-md-2 text-end">
                <a href="{% url 'logout' %}" class="btn bg-light">Logout</a>
            </div>
        </div>

        <!-- Left Section (Agency List) -->
        <div class="row">
            <div class="col-md-3 border-end p-3" id="agency-list">
                <h4 class="text-center">Agency List</h4>

                <input type="text" id="search-agencies" class="form-control mb-3" placeholder="Search Agencies">
                <select id="accepting-referrals-filter" class="form-control mb-3">
                    <option value="">All Agencies</option>
                    <option value="yes">Accepting Referrals</option>
                    <option value="no">Not Accepting Referrals</option>
                </select>

                <ul class="list-group" id="agency-list-items">
                    {% for agency in agencies %}
                        <li class="list-group-item agency-item text-center" data-agency-id="{{ agency.id }}">
                            {{ agency.agency_name }}
                        </li>
                    {% endfor %}
                </ul>
            </div>

            <!-- Right Section (Agency Details + Form) -->
            <div class="col-md-9 p-3" id="agency-details">
                <h4>Agency Details</h4>
                <p>Select an agency to view or update details.</p>

                <form id="agency-detail-form" style="display: none;">
                    {% csrf_token %}

                    <h4 id="agency-name" class="mt-3"></h4> <!-- Ensure agency name is visible -->

                    <p><strong>Last Updated:</strong> <span id="last-updated"></span></p>

            <div id="accepting-referrals-container">
                    <strong>Accepting Referrals:</strong>
                    <select id="accepting-referrals" class="form-select ms-2" style="width: 100px;">
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
            </div>
</form>
            </div>
        </div>
    </div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        function loadAgencyDetails(agencyId) {
    console.log(`Fetching details for agency ID: ${agencyId}`); // Debugging Log
            fetch(`/api/agency/${agencyId}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert(data.error);
                        return;
                    }

                    let agencyNameElem = document.getElementById("agency-name");
                    agencyNameElem.textContent = data.agency_name;
                    agencyNameElem.setAttribute("data-agency-id", agencyId);
                    agencyNameElem.style.display = "block";  // Ensure agency name is visible

                    document.getElementById("accepting-referrals").addEventListener("change", function () {
    let agencyId = document.getElementById("agency-name").getAttribute("data-agency-id");
    let newStatus = this.value === "yes";

    // Remove previous color classes
    this.classList.remove("yes", "no");

    // Apply new color class based on selection
    if (newStatus) {
        this.classList.add("yes");
    } else {
        this.classList.add("no");
    }

    // Send the update to Django
    fetch(`/api/agency/${agencyId}/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ accepting_referrals: newStatus })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            console.log("Updated successfully!");
        } else {
            console.log("Error updating status.");
        }
    })
    .catch(error => console.error("Error updating referrals:", error));
});


                    let acceptingReferralsElem = document.getElementById("accepting-referrals");
                    acceptingReferralsElem.value = data.accepting_referrals ? "yes" : "no";

                    document.getElementById("agency-detail-form").style.display = "block";
                })
                .catch(error => console.error("Error fetching agency details:", error));
                console.log("Received Data:", data);
        }

        function getCSRFToken() {
            return document.querySelector("[name=csrfmiddlewaretoken]").value;
        }

        document.querySelectorAll(".agency-item").forEach(item => {
            item.addEventListener("click", function () {
                let agencyId = this.getAttribute("data-agency-id");
                loadAgencyDetails(agencyId);
            });
        });

        document.getElementById("accepting-referrals").addEventListener("change", function () {
            let agencyId = document.getElementById("agency-name").getAttribute("data-agency-id");
            let newStatus = this.value === "yes";

            fetch(`/api/agency/${agencyId}/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCSRFToken()
                },
                body: JSON.stringify({ accepting_referrals: newStatus })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert("Updated successfully!");
                } else {
                    alert("Error updating status.");
                }
            })
            .catch(error => console.error("Error updating referrals:", error));
        });

    });
</script>

</body>
</html>
