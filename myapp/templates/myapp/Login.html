{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Agency Portal - Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'myapp/style.css' %}">
</head>
<body class="login-page vh-100 d-flex align-items-center justify-content-center" style="background: url('{% static 'myapp/marion1.jpg' %}') no-repeat center center fixed; background-size: cover;">  <!-- Added background image for login -->

   <div class="container" style="margin: 0 auto; max-width: 400px;">
        <div class="card shadow-lg p-4 mx-auto" style="max-width: 400px;">  <!-- Centered Card -->

            <!-- Logo -->
            <img src="{% static 'myapp/picture1.png' %}" alt="Logo" class="img-fluid mx-auto d-block mb-3" style="max-width: 350px;">  <!-- Logo for Signup -->

            <h2 class="text-center">Login</h2>

            <!-- Display Messages -->
            {% if messages %}
                <ul class="messages list-unstyled">
                    {% for message in messages %}
                        <li class="alert alert-{{ message.tags }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}" class="form-label">{{ form.username.label }}</label>
                    {{ form.username }}  <!-- Ensure Bootstrap Styling -->
                </div>

                <div class="mb-3">
                    <label for="{{ form.password.id_for_label }}" class="form-label">{{ form.password.label }}</label>
                    {{ form.password }}  <!-- Ensure Bootstrap Styling -->
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <!-- Forgot Password link -->
            <p class="mt-3 text-center">
                <a href="{% url 'password_reset' %}">Forgot your password?</a>
            </p>

            <p class="mt-3 text-center">Don't have an account? <a href="{% url 'signup' %}">Sign up here</a></p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
